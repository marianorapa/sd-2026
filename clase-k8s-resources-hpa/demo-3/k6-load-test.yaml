apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
data:
  script.js: |
    import http from 'k6/http';
    import { check } from 'k6';
    import { Trend, Rate } from 'k6/metrics';

    const latency = new Trend('fib_latency', true);
    const errorRate = new Rate('fib_errors');

    export const options = {
      stages: [
        { duration: '1m', target: 5  },   // Calentamiento lento
        { duration: '30s', target: 10 },  // Carga moderada
        { duration: '30s', target: 25 },  // Carga alta: CPU debería saturarse
        { duration: '30s', target: 0  },  // Rampa de bajada
      ],
    };

    export default function () {
      const res = http.get('http://fibonacci-api/fib?n=30', {
        timeout: '10s',
      });

      check(res, { 'status 200': (r) => r.status === 200 });
      latency.add(res.timings.duration);
      errorRate.add(res.status !== 200);
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      containers:
      - name: k6
        image: grafana/k6:latest
        args: ["run", "/scripts/script.js"]
        volumeMounts:
        - name: k6-script
          mountPath: /scripts
        resources:
          requests:
            cpu: "200m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
      volumes:
      - name: k6-script
        configMap:
          name: k6-script
      restartPolicy: Never
  backoffLimit: 0
