apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibonacci-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fibonacci-api
  template:
    metadata:
      labels:
        app: fibonacci-api
    spec:
      containers:
      - name: fibonacci-api
        image: us-central1-docker.pkg.dev/handy-droplet-498116-c3/clase-demos/fibonacci-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: "100m"    # El HPA calcula el % sobre este valor
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: fibonacci-api
spec:
  type: NodePort
  selector:
    app: fibonacci-api
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
