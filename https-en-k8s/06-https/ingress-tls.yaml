apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mi-app-ingress
  namespace: default   # cambiá si tus apps están en otro namespace
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Empezar con staging para evitar rate limits de Let's Encrypt.
    # Cambiar a letsencrypt-prod solo cuando el flujo de staging funcione.
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - TU_DOMINIO   # reemplazar con tu IP.sslip.io (ej: 34.72.155.10.sslip.io)
      # cert-manager crea este Secret automáticamente con el certificado.
      # El nombre debe ser consistente entre el bloque tls y el ClusterIssuer.
      secretName: mi-app-tls
  rules:
    - host: TU_DOMINIO   # mismo valor que en tls.hosts
      http:
        paths:
          # Paths más específicos van primero
          - path: /api/v2
            pathType: Prefix
            backend:
              service:
                name: backend-api-2    # reemplazar con el nombre de tu Service
                port:
                  number: 8080         # reemplazar con el puerto de tu Service
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend-api-1    # reemplazar con el nombre de tu Service
                port:
                  number: 8080         # reemplazar con el puerto de tu Service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service  # reemplazar con el nombre de tu Service de frontend
                port:
                  number: 80
