# k8s/demo4-gateway/tcp-routes.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Demo 4: TCPRoutes — una por servicio
#
# Cada TCPRoute le dice al Gateway:
#   "El tráfico que llega por el listener X → derivalo al Service Y"
#
# parentRefs.sectionName referencia el nombre del listener en gateway.yaml
#
# Comparación con Ingress:
#   Ingress:   path: /api/users  → backend: users-api-service   (L7, por URL)
#   TCPRoute:  port: 8081        → backend: users-api-service   (L4, por puerto)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: clase-gateway
      sectionName: frontend     # ← listener "frontend" (port 80)
  rules:
    - backendRefs:
        - name: frontend-service
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: users-api-route
spec:
  parentRefs:
    - name: clase-gateway
      sectionName: users-api    # ← listener "users-api" (port 8081)
  rules:
    - backendRefs:
        - name: users-api-service
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: products-api-route
spec:
  parentRefs:
    - name: clase-gateway
      sectionName: products-api # ← listener "products-api" (port 8082)
  rules:
    - backendRefs:
        - name: products-api-service
          port: 80
