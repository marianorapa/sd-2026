# k8s/demo3-ingress/ingress.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Demo 3: Ingress
#
# Puntos a destacar en clase:
#
#   1. Una sola IP pública para tres servicios
#   2. El Cloud Controller de GCP observa este recurso
#      y crea un Load Balancer HTTP(S) automáticamente
#   3. Las rules definen el routing por path:
#        /              → frontend-service
#        /api/users     → users-api-service
#        /api/products  → products-api-service
#   4. pathType: Prefix → cualquier path que empiece con el prefijo
#
# Qué crea GCP automáticamente al aplicar este YAML:
#   - Un Load Balancer HTTP(S) externo (observable en la consola)
#   - Una IP pública (aparece en kubectl get ingress)
#   - Health checks para cada backend Service
#   - Reglas de URL Map
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clase-ingress
  annotations:
    # Ingress Class: usa el controller de GCP (GKE Ingress)
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - http:
        paths:
          # ── Frontend: raíz del sitio ──────────────────────────────────────
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

          # ── Users API ─────────────────────────────────────────────────────
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: users-api-service
                port:
                  number: 80

          # ── Products API ──────────────────────────────────────────────────
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: products-api-service
                port:
                  number: 80
