# k8s/demo2-services/frontend.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Demo 2: Frontend — 1 réplica (es estático, no necesita balanceo propio)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: us-central1-docker.pkg.dev/handy-droplet-498116-c3/clase-demos/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: frontend
  annotations:
    cloud.google.com/backend-config: '{"default": "clase-backend-config"}'
spec:
  type: NodePort        # ← requerido por GKE Ingress (el LB rutea directo al nodo)
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
