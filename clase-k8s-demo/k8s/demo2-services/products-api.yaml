# k8s/demo2-services/products-api.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Demo 2: Products API — misma estructura que users-api
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-api
  labels:
    app: products-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: products-api
  template:
    metadata:
      labels:
        app: products-api
    spec:
      containers:
        - name: products-api
          image: us-central1-docker.pkg.dev/handy-droplet-498116-c3/clase-demos/products-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: products-api-service
  labels:
    app: products-api
  annotations:
    cloud.google.com/backend-config: '{"default":"clase-backend-config"}'
spec:
  type: NodePort        # ← requerido por GKE Ingress (el LB rutea directo al nodo)
  selector:
    app: products-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
